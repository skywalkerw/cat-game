<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的金渐层 · 宠物猫</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="game">
    <header class="header">
      <h1>🐱 我的金渐层</h1>
      <p class="subtitle">好好照顾你的小猫咪吧</p>
    </header>

    <main class="main">
      <section class="stats-panel">
        <div class="stat" data-stat="hunger">
          <span class="stat-icon">🍖</span>
          <div class="stat-info">
            <label>饱食度</label>
            <div class="bar"><div class="bar-fill" id="hunger-bar"></div></div>
          </div>
        </div>
        <div class="stat" data-stat="energy">
          <span class="stat-icon">💤</span>
          <div class="stat-info">
            <label>精力</label>
            <div class="bar"><div class="bar-fill" id="energy-bar"></div></div>
          </div>
        </div>
        <div class="stat" data-stat="happiness">
          <span class="stat-icon">😊</span>
          <div class="stat-info">
            <label>心情</label>
            <div class="bar"><div class="bar-fill" id="happiness-bar"></div></div>
          </div>
        </div>
        <div class="stat" data-stat="play">
          <span class="stat-icon">🎾</span>
          <div class="stat-info">
            <label>玩耍欲</label>
            <div class="bar"><div class="bar-fill" id="play-bar"></div></div>
          </div>
        </div>
        <div class="stat stat-wide" data-stat="bladder">
          <span class="stat-icon">🚽</span>
          <div class="stat-info">
            <label>如厕需求</label>
            <div class="bar"><div class="bar-fill" id="bladder-bar"></div></div>
          </div>
        </div>
      </section>

      <section class="scene">
        <div class="room" id="room">
          <div class="window"></div>
          <div class="cardboard-box" id="cardboard-box" aria-hidden="true">
            <span class="box-opening">
              <span class="box-cat-tail" aria-hidden="true"></span>
            </span>
          </div>
          <div class="room-door" id="room-door" title="门"></div>
          <div class="outdoor-garden" aria-hidden="true">
            <div class="garden-bed garden-bed-left"></div>
            <div class="garden-bed garden-bed-right"></div>
            <div class="garden-bed garden-bed-center"></div>
            <div class="garden-path"></div>
            <span class="garden-bush bush-1"></span>
            <span class="garden-bush bush-2"></span>
            <span class="garden-bush bush-3"></span>
            <span class="garden-grass grass-1"></span>
            <span class="garden-grass grass-2"></span>
            <span class="garden-grass grass-3"></span>
            <span class="garden-grass grass-4"></span>
            <button type="button" class="garden-pond" id="garden-pond" title="池塘" aria-label="池塘">
              <span class="pond-rim" aria-hidden="true"></span>
              <span class="pond-water" aria-hidden="true"></span>
              <span class="pond-shimmer" aria-hidden="true"></span>
              <span class="pond-lily" aria-hidden="true"></span>
              <div class="garden-fish" id="garden-fish"></div>
            </button>
            <div class="garden-insects" id="garden-insects"></div>
            <span class="flower flower-1"></span>
            <span class="flower flower-2"></span>
            <span class="flower flower-3"></span>
            <span class="flower flower-4"></span>
            <span class="flower flower-5"></span>
            <span class="flower flower-6"></span>
            <span class="flower flower-7"></span>
            <span class="flower flower-8"></span>
            <span class="flower flower-9"></span>
            <span class="flower flower-10"></span>
            <span class="flower flower-11"></span>
            <span class="flower flower-12"></span>
            <span class="flower flower-13"></span>
            <span class="flower flower-14"></span>
            <span class="flower flower-15"></span>
            <span class="flower flower-16"></span>
            <span class="flower flower-tall flower-17"></span>
            <span class="flower flower-tall flower-18"></span>
            <span class="flower flower-19"></span>
            <span class="flower flower-20"></span>
            <span class="flower flower-21"></span>
            <span class="flower flower-22"></span>
            <span class="flower flower-23"></span>
            <span class="flower flower-24"></span>
            <span class="flower flower-25"></span>
            <span class="flower flower-mini flower-26"></span>
            <span class="flower flower-mini flower-27"></span>
            <span class="flower flower-mini flower-28"></span>
            <span class="flower flower-mini flower-29"></span>
            <span class="flower flower-mini flower-30"></span>
            <span class="flower flower-mini flower-31"></span>
            <span class="flower flower-mini flower-32"></span>
            <span class="flower flower-mini flower-33"></span>
            <span class="flower flower-mini flower-34"></span>
          </div>
          <div class="bed"></div>
          <div class="litter-box" id="litter-box"></div>
          <div class="litter-waste" id="litter-waste" aria-hidden="true"></div>
          <div class="trash-bin" id="trash-bin" title="把猫屎倒进垃圾桶"></div>
          <div class="poop-scoop" id="poop-scoop" aria-hidden="true" title="拖动铲子到垃圾桶">
            <span class="scoop-poop"></span>
          </div>
          <div class="food-bowl" id="food-bowl"></div>
          <div class="play-toy" id="play-toy" aria-hidden="true"></div>
          <div class="purr-bubbles" id="purr-bubbles" aria-hidden="true">
            <span class="purr-text">呼噜</span>
            <span class="purr-text">呼噜</span>
            <span class="purr-text">呼噜</span>
          </div>
          <div class="floor-mess" id="floor-mess" aria-hidden="true"></div>
          <div class="cat-container" id="cat-container">
            <div class="cat" id="cat">
              <div class="cat-body">
                <div class="cat-tail"></div>
                <div class="cat-chest"></div>
                <div class="cat-torso"></div>
                <div class="cat-head">
                  <div class="cat-ear cat-ear-left">
                    <span class="cat-ear-inner"></span>
                  </div>
                  <div class="cat-ear cat-ear-right">
                    <span class="cat-ear-inner"></span>
                  </div>
                  <div class="cat-face">
                    <div class="cat-top-shade"></div>
                    <div class="cat-tabby-m"></div>
                    <div class="cat-muzzle"></div>
                    <div class="cat-cheek cat-cheek-left"></div>
                    <div class="cat-cheek cat-cheek-right"></div>
                    <div class="cat-cheek-stripe cat-cheek-stripe-left"></div>
                    <div class="cat-cheek-stripe cat-cheek-stripe-right"></div>
                    <div class="cat-eye cat-eye-left">
                      <div class="cat-eye-ball">
                        <div class="cat-iris">
                          <div class="cat-pupil"></div>
                          <div class="cat-highlight"></div>
                        </div>
                      </div>
                    </div>
                    <div class="cat-eye cat-eye-right">
                      <div class="cat-eye-ball">
                        <div class="cat-iris">
                          <div class="cat-pupil"></div>
                          <div class="cat-highlight"></div>
                        </div>
                      </div>
                    </div>
                    <div class="cat-nose"></div>
                    <div class="cat-mouth"></div>
                    <div class="cat-whiskers cat-whiskers-left">
                      <span></span><span></span><span></span>
                    </div>
                    <div class="cat-whiskers cat-whiskers-right">
                      <span></span><span></span><span></span>
                    </div>
                  </div>
                </div>
                <div class="cat-paw cat-paw-left"></div>
                <div class="cat-paw cat-paw-right"></div>
              </div>
              <div class="cat-zzz" id="cat-zzz">Zzz</div>
              <div class="cat-heart" id="cat-heart">♥</div>
            </div>
          </div>
        </div>
        <p class="mood-text" id="mood-text">喵～ 主人好！</p>
      </section>

      <section class="actions">
        <button class="action-btn" id="btn-feed" title="投喂猫粮">
          <span class="btn-icon">🍽️</span>
          <span>投喂</span>
        </button>
        <button class="action-btn" id="btn-play" title="用逗猫棒玩耍">
          <span class="btn-icon">🪶</span>
          <span>逗猫</span>
        </button>
        <button class="action-btn" id="btn-pet" title="摸摸头">
          <span class="btn-icon">🤚</span>
          <span>抚摸</span>
        </button>
        <button class="action-btn" id="btn-sleep" title="让猫咪睡觉">
          <span class="btn-icon">🛏️</span>
          <span>睡觉</span>
        </button>
        <button class="action-btn" id="btn-toilet" title="带猫咪上厕所">
          <span class="btn-icon">🚽</span>
          <span>上厕所</span>
        </button>
      </section>

      <section class="log-panel">
        <h3>互动记录</h3>
        <ul class="log-list" id="log-list"></ul>
      </section>
    </main>

    <footer class="footer">
      <span id="time-display"></span>
      <span>· 数据保存在本地，离线可玩</span>
    </footer>
  </div>

  <div class="toast" id="toast"></div>

  <script src="game.js"></script>
</body>
</html>
